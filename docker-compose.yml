version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: bakhus-postgres
    environment:
      POSTGRES_DB: bakhus
      POSTGRES_USER: bakhus
      POSTGRES_PASSWORD: bakhus
    ports:
      - "5432:5432"
    volumes:
      - bakhus-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakhus -d bakhus"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: bakhus-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: bakhus-frontend
    ports:
      - "4173:80"
    volumes:
      - bakhus-uploads:/app/.local/uploads:ro
    depends_on:
      - postgres-api

  postgres-api:
    build:
      context: .
      dockerfile: docker/postgres-api.Dockerfile
    container_name: bakhus-postgres-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8078
      DATABASE_URL: postgresql://bakhus:bakhus@postgres:5432/bakhus
      N8N_IMPORT_WEBHOOK_URL: ${N8N_IMPORT_WEBHOOK_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4173}
    ports:
      - "8078:8078"
    volumes:
      - bakhus-uploads:/app/.local/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  bakhus-postgres-data:
  bakhus-uploads:
